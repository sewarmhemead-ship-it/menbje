<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1220" />
  <title>تسجيل الدخول · Vault AI</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z'/%3E%3C/svg%3E" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Cairo', 'sans-serif'] }, colors: { midnight: { 950: '#0b1220' }, emerald: { 500: '#10b981' } } } } };
  </script>
  <style>
    .glass { background: rgba(11, 18, 32, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    body { min-height: 100vh; }
    .admin-demo-badge {
      background: rgba(16, 185, 129, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.2);
    }
    .admin-demo-badge:hover {
      background: rgba(16, 185, 129, 0.15);
      box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.4), 0 0 20px rgba(16, 185, 129, 0.08);
    }
    .login-credentials-box {
      background: rgba(16, 185, 129, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(16, 185, 129, 0.25);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.8125rem;
      text-align: right;
      width: 100%;
      max-width: 260px;
    }
    .login-credentials-box .label { color: rgba(255, 255, 255, 0.5); font-size: 0.75rem; margin-bottom: 0.35rem; }
    .login-credentials-box .line { margin-top: 0.25rem; }
  </style>
</head>
<body class="bg-[#0b1220] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">
  <div class="glass rounded-2xl p-8 w-full max-w-md shadow-2xl">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-white">Vault AI</h1>
      <p class="text-slate-500 text-sm mt-1">محاسبة ومؤسسات عالمية</p>
    </div>
    <div id="login-form">
      <input type="text" id="login-email" placeholder="البريد الإلكتروني أو اسم المستخدم" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm mb-3 focus:ring-2 focus:ring-emerald-500/50 outline-none" autocomplete="username" />
      <input type="password" id="login-password" placeholder="كلمة المرور" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm mb-4 focus:ring-2 focus:ring-emerald-500/50 outline-none" autocomplete="current-password" />
      <p id="login-error" class="text-rose-400 text-sm mb-3 hidden"></p>
      <button type="button" id="btn-login" class="w-full py-3 rounded-xl bg-emerald-500 text-white font-medium hover:bg-emerald-600 transition-colors">تسجيل الدخول</button>
      <div class="mt-5 pt-4 border-t border-white/10 flex flex-col items-center gap-3">
        <div class="flex flex-wrap justify-center gap-2 w-full max-w-[320px]">
          <button type="button" id="btn-admin-demo" onclick="adminQuickLogin(); return false;" class="admin-demo-badge flex-1 min-w-[140px] py-2.5 px-4 rounded-xl text-sm font-medium text-emerald-300/95 border border-emerald-500/30 bg-emerald-500/10 hover:bg-emerald-500/20 hover:border-emerald-500/50 transition-all duration-200 backdrop-blur-sm">
            دخول تجريبي للمدير (Super Admin)
          </button>
          <button type="button" id="btn-store-demo" onclick="storeQuickLogin(); return false;" class="admin-demo-badge flex-1 min-w-[140px] py-2.5 px-4 rounded-xl text-sm font-medium text-emerald-300/95 border border-emerald-500/30 bg-emerald-500/10 hover:bg-emerald-500/20 hover:border-emerald-500/50 transition-all duration-200 backdrop-blur-sm">
            دخول زبون تجريبي
          </button>
        </div>
        <div class="login-credentials-box w-full max-w-[320px]">
          <div class="label">بيانات الدخول التجريبي:</div>
          <div class="line">Email: admin@vault.local · Password: admin123</div>
          <div class="label mt-3">بيانات دخول زبون (Store Admin):</div>
          <div class="line">Email: basic@demo.local · Password: password123</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const API = window.location.origin + '/api';
    const ADMIN_EMAIL = 'admin@vault.local';
    const ADMIN_PASS = 'admin123';
    const STORE_EMAIL = 'basic@demo.local';
    const STORE_PASS = 'password123';

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      err.classList.add('hidden');
      if (!email || !password) { err.textContent = 'أدخل البريد وكلمة المرور'; err.classList.remove('hidden'); return; }
      try {
        const r = await fetch(API + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email || undefined, username: email || undefined, password }) });
        const j = await r.json();
        if (!j.success) { err.textContent = j.error || 'فشل تسجيل الدخول'; err.classList.remove('hidden'); return; }
        localStorage.setItem('vault_token', j.data.token);
        localStorage.setItem('vault_user', JSON.stringify(j.data.user));
        const role = (j.data.user && j.data.user.role) || '';
        if (role === 'SUPER_ADMIN') {
          window.location.href = 'super-admin.html';
        } else {
          window.location.href = 'index.html';
        }
      } catch (e) {
        err.textContent = 'خطأ في الاتصال';
        err.classList.remove('hidden');
      }
    }

    document.getElementById('btn-login').onclick = doLogin;

    function adminQuickLogin() {
      document.getElementById('login-email').value = ADMIN_EMAIL;
      document.getElementById('login-password').value = ADMIN_PASS;
      doLogin();
    }
    function storeQuickLogin() {
      document.getElementById('login-email').value = STORE_EMAIL;
      document.getElementById('login-password').value = STORE_PASS;
      doLogin();
    }
    document.getElementById('btn-admin-demo').onclick = adminQuickLogin;
    document.getElementById('btn-store-demo').onclick = storeQuickLogin;
  </script>
</body>
</html>
