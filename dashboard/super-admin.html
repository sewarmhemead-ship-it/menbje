<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1220" />
  <title>Super Admin · Vault AI</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z'/%3E%3C/svg%3E" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="/dist/tailwind.css" rel="stylesheet" />
  <style>
    .glass-gold { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(251, 191, 36, 0.2); }
    .gold-accent { color: #fbbf24; border-color: rgba(251, 191, 36, 0.4); }
    .sa-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .sa-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; min-width: 640px; }
    .sa-table th,
    .sa-table td { padding: 12px 15px; text-align: right; }
    .sa-table thead th { border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sa-table tbody tr { background: rgba(255,255,255,0.03); }
    .sa-table tbody tr:hover { background: rgba(255,255,255,0.06); }
    .vault-select.industry-switch {
      width: 140px;
      min-width: 140px;
      font-size: 0.8125rem;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(16, 185, 129, 0.35);
      color: #f8fafc;
      border-radius: 0.5rem;
      padding: 0.4rem 0.5rem;
    }
    .vault-select.industry-switch:focus { outline: none; border-color: #10b981; }
    .status-badge {
      display: inline-block;
      padding: 0.35rem 0.65rem;
      border-radius: 9999px;
      font-size: 0.8125rem;
      font-weight: 500;
    }
    .status-badge.text-emerald-400 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .status-badge.text-rose-400 { background: rgba(244, 63, 94, 0.2); color: #fb7185; }
    .status-badge.text-slate-500 { background: rgba(100, 116, 139, 0.2); color: #94a3b8; }
  </style>
</head>
<body class="bg-[#0b1220] text-slate-200 font-sans min-h-screen p-6">
  <div id="dashboard">
    <header class="flex flex-wrap items-center justify-between gap-4 mb-8 pb-4 border-b border-amber-500/20">
      <h1 class="text-2xl font-bold gold-accent">Super Admin · إدارة المستأجرين (Tenant Manager)</h1>
      <a href="index.html" class="text-slate-400 hover:text-white text-sm">← العودة للوحة التحكم</a>
    </header>
    <div class="glass-gold rounded-2xl p-6 mb-6 sa-table-wrap">
      <table class="sa-table text-sm">
        <thead>
          <tr class="text-slate-400">
            <th>المستخدم / البريد</th>
            <th>نوع النشاط</th>
            <th>الحالة</th>
            <th>Master Switch (نوع النشاط)</th>
            <th>إجراء</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
    <p id="sa-error" class="text-rose-400 text-sm hidden"></p>
  </div>
  <script>
    const API = window.location.origin + '/api';

    function getAuthHeaders() {
      const t = localStorage.getItem('vault_token');
      return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : {};
    }

    function checkAccess() {
      const token = localStorage.getItem('vault_token');
      let user = null;
      try {
        const raw = localStorage.getItem('vault_user');
        if (raw) user = JSON.parse(raw);
      } catch (e) {}
      if (!token || !user || (user.role || '').toUpperCase() !== 'SUPER_ADMIN') {
        if (window.location.pathname.includes('login') === false) {
          console.log('Redirecting to login...');
          window.location.href = '/dashboard/login.html';
        }
        return false;
      }
      return true;
    }

    const INDUSTRY_OPTIONS = [
      { value: 'GENERAL', label: 'عام' },
      { value: 'SUPERMARKET', label: 'سوبرماركت' },
      { value: 'PHARMACY', label: 'صيدلية' },
      { value: 'CLOTHING', label: 'ملابس' },
      { value: 'ELECTRONICS', label: 'إلكترونيات' },
      { value: 'CONSTRUCTION', label: 'بناء' },
      { value: 'RESTAURANT', label: 'مطعم' },
      { value: 'BEAUTY', label: 'عطور/تجميل' },
      { value: 'FURNITURE', label: 'أثاث' },
      { value: 'STATIONERY', label: 'قرطاسية' },
    ];

    function industrySelect(current, userId) {
      const opts = INDUSTRY_OPTIONS.map(o => `<option value="${o.value}" ${(current || 'GENERAL') === o.value ? 'selected' : ''}>${o.label}</option>`).join('');
      return `<select class="vault-select industry-switch" data-id="${userId}">${opts}</select>`;
    }

    function statusLabel(s) {
      return { active: 'نشط', suspended: 'موقوف', expired: 'منتهي', pending: 'قيد الانتظار' }[s] || s;
    }

    function loadUsers() {
      if (!checkAccess()) return;
      const tbody = document.getElementById('users-tbody');
      const errEl = document.getElementById('sa-error');
      errEl.classList.add('hidden');
      fetch(API + '/users', { headers: getAuthHeaders() })
        .then(r => {
          if (r.status === 401) { if (!window.location.pathname.includes('login')) { console.log('Redirecting to login...'); window.location.href = '/dashboard/login.html'; } return null; }
          return r.json();
        })
        .then(j => {
          if (!j) return;
          if (!j.success) {
            errEl.textContent = j.error || 'فشل التحميل';
            errEl.classList.remove('hidden');
            return;
          }
          const list = j.data || [];
          if (!list.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="py-4 text-slate-500 text-center">لا مستخدمين</td></tr>';
            return;
          }
          tbody.innerHTML = list.map(u => {
            const name = (u.fullName || u.username || u.email || u.id || '—');
            const email = u.email || '—';
            const ind = u.industryType || 'GENERAL';
            const status = u.status || 'active';
            const indLabel = INDUSTRY_OPTIONS.find(o => o.value === ind)?.label || ind;
            return `<tr>
              <td class="text-white">${name}<br><span class="text-slate-500 text-xs">${email}</span></td>
              <td class="text-slate-300">${indLabel}</td>
              <td><span class="status-badge ${status === 'active' ? 'text-emerald-400' : status === 'suspended' ? 'text-rose-400' : 'text-slate-500'}">${statusLabel(status)}</span></td>
              <td>${industrySelect(ind, u.id)}</td>
              <td>
                <button type="button" class="btn-status px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${status === 'suspended' ? 'bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30' : 'bg-rose-500/20 text-rose-400 hover:bg-rose-500/30'}" data-id="${u.id}" data-current="${status}">${status === 'suspended' ? 'تفعيل' : 'إيقاف'}</button>
              </td>
            </tr>`;
          }).join('');

          tbody.querySelectorAll('.industry-switch').forEach(el => {
            el.addEventListener('change', () => setIndustry(el.dataset.id, el.value));
          });
          tbody.querySelectorAll('.btn-status').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = btn.dataset.id;
              const next = btn.dataset.current === 'suspended' ? 'active' : 'suspended';
              setStatus(id, next);
            });
          });
        })
        .catch(() => {
          errEl.textContent = 'خطأ في الاتصال بالخادم';
          errEl.classList.remove('hidden');
        });
    }

    function setIndustry(userId, industryType) {
      if (!checkAccess()) return;
      fetch(API + '/users/' + encodeURIComponent(userId), {
        method: 'PATCH',
        headers: getAuthHeaders(),
        body: JSON.stringify({ industryType }),
      })
        .then(r => r.json())
        .then(j => {
          if (j.success) loadUsers();
          else document.getElementById('sa-error').textContent = j.error || 'فشل التحديث';
        });
    }

    function setStatus(userId, status) {
      if (!checkAccess()) return;
      fetch(API + '/users/' + encodeURIComponent(userId), {
        method: 'PATCH',
        headers: getAuthHeaders(),
        body: JSON.stringify({ status }),
      })
        .then(r => r.json())
        .then(j => {
          if (j.success) loadUsers();
          else document.getElementById('sa-error').textContent = j.error || 'فشل التحديث';
        });
    }

    if (checkAccess()) loadUsers();
  </script>
</body>
</html>
